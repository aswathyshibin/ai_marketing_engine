<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Professional Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;700;800&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #EAB308;
            --primary: #FBBF24;
            --bg: #030712;
            --text: #F8FAFC;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            width: 1080px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        body.lang-malayalam {
            font-family: 'Manjari', sans-serif;
        }
        .poster {
            width: 1080px;
            height: 1080px;
            padding: 50px;
            position: relative;
            background: 
                radial-gradient(circle at 50% 0%, rgba(234, 179, 8, 0.15) 0%, transparent 70%),
                linear-gradient(rgba(3, 7, 18, 0.9), rgba(3, 7, 18, 0.97)),
                url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1080&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo-img {
            max-width: 240px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.4));
        }
        .brand-motto {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 4px;
            color: #94A3B8;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .hero-section {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }
        .course-badge {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #FFFFFF;
            background: linear-gradient(90deg, var(--gold), #B45309);
            padding: 10px 30px;
            border-radius: 60px;
            display: inline-block;
            margin: 0 auto;
            box-shadow: 0 10px 20px -5px rgba(234, 179, 8, 0.4);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            margin: 10px 0;
            color: #FFFFFF;
            letter-spacing: -2px;
            text-transform: capitalize;
        }
        .lang-malayalam h1 {
            font-family: 'Manjari', sans-serif;
            font-size: 64px;
            font-weight: 700;
            letter-spacing: 0;
        }
        .description {
            font-size: 24px;
            font-weight: 500;
            line-height: 1.4;
            color: #CBD5E1;
            max-width: 800px;
            margin: 0 auto 20px;
            font-style: italic;
        }
        .lang-malayalam .description {
            font-family: 'Manjari', sans-serif;
            font-style: normal;
            font-size: 22px;
        }
        .visual-frame {
            width: 100%;
            height: 420px;
            border-radius: 40px;
            overflow: hidden;
            border: 2px solid rgba(234, 179, 8, 0.4);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(234, 179, 8, 0.1);
            margin: 15px auto;
            position: relative;
        }
        .visual-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .footer {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(234, 179, 8, 0.2);
            margin-top: 10px;
        }
        .contact-us {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .lang-malayalam .contact-us {
            font-family: 'Manjari', sans-serif;
            font-size: 20px;
        }
        .phone {
            font-size: 60px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: 5px;
            line-height: 1;
        }
    </style>
</head>
<body class="lang-{{ language | default('english') }}">
    <div class="particles"></div>
    <div class="poster">
        <div class="content">
            <div class="logo-section">
                {% if logo_data %}
                <img src="{{ logo_data }}" class="logo-img" alt="Acadeno Logo">
                {% else %}
                <div style="font-size: 32px; font-weight: 900; color: white;">ACADENO</div>
                {% endif %}
                <p class="brand-motto">Where Technology Builds Careers</p>
            </div>

            <div class="hero-section">
                <div class="course-badge">{{ course_name }}</div>
                <h1>{{ headline }}</h1>
                <p class="description">{{ topic }}</p>
                
                <div class="visual-frame">
                    <img src="{{ bg_url }}" 
                         class="visual-img" 
                         alt="Course Visual"
                         onerror="this.src='https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1080&q=80'">
                </div>
            </div>

            <div class="footer">
                <p class="contact-us">Speak with our Experts:</p>
                <p class="phone">9447933266</p>
            </div>
        </div>
    </div>
</body>
</html>
