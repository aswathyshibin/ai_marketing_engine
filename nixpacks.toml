[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/playwright-browsers"
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = [
    "python3", "ffmpeg", "libnss3", "nspr", "libatk", "at-spi2-atk", "libdrm", "libxcb", "libxkbcommon", "mesa", "alsa-lib", "libgbm1",
    "pango", "cairo", "gtk3", "libX11", "libXcomposite", "libXdamage", "libXext", "libXfixes", "libXi", "libXrandr", "libXrender", "libXss", "libXtst"
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt",
    "mkdir -p /app/playwright-browsers",
    "PLAYWRIGHT_BROWSERS_PATH=/app/playwright-browsers playwright install chromium"
]

[phases.postinstall]
cmds = [
    "echo 'Listing playwright-browsers directory:'",
    "ls -R /app/playwright-browsers || echo 'Directory not found!'"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
