[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/playwright-browsers"

[phases.setup]
nixPkgs = ["python3", "ffmpeg", "libgbm1", "libnss3", "nspr", "libatk", "at-spi2-atk", "libdrm", "libxcb", "libxkbcommon", "mesa", "alsa-lib", "fontconfig", "freetype", "pango"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "mkdir -p /app/playwright-browsers",
    "PLAYWRIGHT_BROWSERS_PATH=/app/playwright-browsers playwright install chromium"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
